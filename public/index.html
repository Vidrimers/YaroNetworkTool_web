<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yaro Network Tool</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-container">
      <div class="auth-header">
        <h1>Yaro Network Tool Portal</h1>
        <p>Безопасный VPN-доступ</p>
      </div>
      <div id="authContent">
        <button class="btn btn-telegram" id="btnTelegramLogin">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white" style="margin-right:8px;vertical-align:middle"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg>
          Войти через Telegram
        </button>
        <p class="text-muted" style="margin-top:16px;font-size:0.85em">
          Или используйте кнопку "Мой кабинет" в Telegram боте <b>@YaroAutoAdminPCbot</b>
        </p>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" style="display:none">
    <!-- Top nav -->
    <nav id="topNav" class="top-nav">
      <div class="nav-brand">Yaro Network Tool</div>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="#" data-page="dashboard">Главная</a>
        <a href="#" data-page="connection">Подключение</a>
        <a href="#" data-page="extend">Продление</a>
        <a href="#" data-page="requests">Запросы</a>
        <a href="#" data-page="download">Скачать</a>
        <a href="#" data-page="help">Помощь</a>
        <a href="#" data-page="admin" id="navAdmin" style="display:none">Админ</a>
        <button class="btn btn-sm btn-secondary nav-logout" id="btnLogout">Выйти</button>
      </div>
    </nav>

    <!-- Pages -->
    <main class="main-content">
      <div id="page-dashboard" class="page active"></div>
      <div id="page-connection" class="page"></div>
      <div id="page-extend" class="page"></div>
      <div id="page-requests" class="page"></div>
      <div id="page-download" class="page"></div>
      <div id="page-help" class="page"></div>
      <div id="page-admin" class="page"></div>
    </main>
  </div>

  <!-- Toast container -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/js/app.js" type="module"></script>
</body>
</html>
